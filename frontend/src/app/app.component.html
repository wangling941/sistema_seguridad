<ion-app>
  <ion-split-pane contentId="main-content" when="lg">
    <ion-menu contentId="main-content" type="overlay" *ngIf="auth.isAuthenticated()">
      <ion-content>
        <div class="brand-panel">
          <div class="brand-mark">SP</div>
          <div>
            <h1>Paraiso Verde</h1>
            <p>Control de seguridad</p>
          </div>
        </div>

        <ion-list lines="none">
          <ion-menu-toggle auto-hide="false" *ngFor="let page of pages">
            <ion-item routerDirection="root" [routerLink]="page.url" routerLinkActive="selected">
              <ion-icon slot="start" [name]="page.icon"></ion-icon>
              <ion-label>{{ page.title }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>

      <ion-footer>
        <ion-toolbar>
          <ion-button fill="clear" expand="block" color="medium" (click)="logout()">
            <ion-icon slot="start" name="log-out-outline"></ion-icon>
            Cerrar sesion
          </ion-button>
        </ion-toolbar>
      </ion-footer>
    </ion-menu>

    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
