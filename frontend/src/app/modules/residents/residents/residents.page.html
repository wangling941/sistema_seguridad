<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Residentes</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openForm()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="app-surface">
  <div class="page-wrap animate-in">
    <div class="page-title">
      <div>
        <h1>Residentes</h1>
        <p>{{ total }} registros en el sistema</p>
      </div>
    </div>

    <div class="toolbar-row">
      <ion-searchbar
        [(ngModel)]="search"
        (ionInput)="load()"
        placeholder="Buscar por nombre o DNI"
      ></ion-searchbar>
      <ion-button fill="outline" (click)="load()">
        <ion-icon slot="start" name="refresh-outline"></ion-icon>
        Actualizar
      </ion-button>
    </div>

    <section class="data-card">
      <div class="responsive-table" *ngIf="residents.length; else empty">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>DNI</th>
              <th>Estado</th>
              <th>Creado</th>
              <th style="text-align: right">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let resident of residents">
              <td><strong>{{ resident.name }}</strong></td>
              <td>{{ resident.dni }}</td>
              <td>
                <span
                  class="status-pill"
                  [class.inactive]="resident.status === 'inactive'"
                >
                  {{ resident.status === 'active' ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td>{{ resident.createdAt | date:'short' }}</td>
              <td class="actions">
                <ion-button
                  size="small"
                  fill="clear"
                  (click)="openForm(resident)"
                >
                  <ion-icon slot="icon-only" name="create-outline"></ion-icon>
                </ion-button>
                <ion-button
                  size="small"
                  fill="clear"
                  color="danger"
                  (click)="deleteResident(resident)"
                >
                  <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                </ion-button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <ng-template #empty
        ><div class="empty-state">
          No hay residentes para mostrar.
        </div></ng-template
      >
    </section>
  </div>
</ion-content>
