<ion-header>
  <ion-toolbar>
    <ion-title>{{ vehicle ? "Editar" : "Nuevo" }} vehículo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="form" (ngSubmit)="save()">
    <!-- Placa -->
    <ion-item>
      <ion-label position="floating">Placa *</ion-label>
      <ion-input
        formControlName="plate"
        type="text"
        maxlength="10"
        (input)="formatPlate()"
      ></ion-input>
    </ion-item>
    <ion-item
      lines="none"
      *ngIf="form.get('plate')?.invalid && form.get('plate')?.touched"
    >
      <ion-text color="danger" class="error-text">
        <ion-icon name="alert-circle-outline" slot="start"></ion-icon>
        <span *ngIf="form.get('plate')?.hasError('required')"
          >La placa es requerida.</span
        >
        <span *ngIf="form.get('plate')?.hasError('pattern')"
          >La placa solo puede contener letras, números y guiones.</span
        >
        <span *ngIf="form.get('plate')?.hasError('minlength')"
          >La placa debe tener al menos 3 caracteres.</span
        >
      </ion-text>
    </ion-item>

    <!-- Residente -->
    <ion-item>
      <ion-label>Residente</ion-label>
      <ion-select formControlName="residentId" interface="popover">
        <ion-select-option [value]="null">Sin residente</ion-select-option>
        <ion-select-option *ngFor="let r of residents" [value]="r.id">
          {{ r.name }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <!-- Botones -->
    <div class="form-actions">
      <ion-button
        fill="clear"
        color="medium"
        (click)="dismiss()"
        expand="block"
      >
        Cancelar
      </ion-button>
      <ion-button
        type="submit"
        [disabled]="form.invalid"
        expand="block"
        shape="round"
      >
        {{ vehicle ? "Actualizar" : "Crear" }}
      </ion-button>
    </div>
  </form>
</ion-content>
