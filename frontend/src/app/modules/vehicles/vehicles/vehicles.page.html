<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Vehículos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openForm()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="app-surface">
  <div class="page-wrap animate-in">
    <div class="page-title">
      <div>
        <h1>Vehículos</h1>
        <p>{{ total }} placas registradas</p>
      </div>
    </div>

    <div class="toolbar-row">
      <ion-searchbar
        [(ngModel)]="search"
        (ionInput)="load()"
        placeholder="Buscar por placa o residente"
      ></ion-searchbar>
      <ion-button fill="outline" (click)="load()">
        <ion-icon slot="start" name="refresh-outline"></ion-icon>
        Actualizar
      </ion-button>
    </div>

    <section class="data-card">
      <div class="responsive-table" *ngIf="vehicles.length; else empty">
        <table>
          <thead>
            <tr>
              <th>Placa</th>
              <th>Residente</th>
              <th>Creado</th>
              <th style="text-align: right">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let vehicle of vehicles">
              <td><strong>{{ vehicle.plate }}</strong></td>
              <td>{{ getResidentName(vehicle.residentId) }}</td>
              <td>{{ vehicle.createdAt | date:'short' }}</td>
              <td class="actions">
                <ion-button
                  size="small"
                  fill="clear"
                  (click)="openForm(vehicle)"
                >
                  <ion-icon slot="icon-only" name="create-outline"></ion-icon>
                </ion-button>
                <ion-button
                  size="small"
                  fill="clear"
                  color="danger"
                  (click)="deleteVehicle(vehicle)"
                >
                  <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                </ion-button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <ng-template #empty
        ><div class="empty-state">
          No hay vehículos registrados.
        </div></ng-template
      >
    </section>
  </div>
</ion-content>
